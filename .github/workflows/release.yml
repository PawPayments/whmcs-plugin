name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: zip -r "pawpayments-whmcs-${GITHUB_REF_NAME}.zip" modules/ README.md

      - run: gh release create "$GITHUB_REF_NAME" "pawpayments-whmcs-${GITHUB_REF_NAME}.zip" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
